manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff  # ドライバの提供元
      url-base: https://github.com/badjeff
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver # トラックボール用ドライバ
      remote: badjeff
      revision: main
    - name: zmk-input-behavior-listener # マウス入力制御用
      remote: badjeff
      revision: main
  self:
    path: config
