manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: main
      import: true # これを追加することでKconfigを自動認識させます
    - name: zmk-input-behavior-listener
      remote: badjeff
      revision: main
      import: true # これを追加
  self:
    path: config
