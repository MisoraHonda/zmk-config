CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_SENSOR_MX8650=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# NFCピン（P0.09 / P0.10）を通常のGPIOとして使用する（重要）
CONFIG_NFCT_PINS_AS_GPIOS=y

# ZMK Studio を有効化
CONFIG_ZMK_STUDIO=y

# 開発中のテストを楽にするため、Studio接続時のロック解除手順を無効化
CONFIG_ZMK_STUDIO_LOCKING=n
