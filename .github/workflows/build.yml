name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init and Update
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Force Prepare Shields
        run: |
          # あなたの boards/shields を ZMK 本体へ強制コピー
          # これで "Shield not found" は物理的にあり得なくなります
          mkdir -p zmk/app/boards/shields
          cp -r boards/shields/* zmk/app/boards/shields/

      - name: Build Right (Central)
        run: |
          # ボード名はリストに必ず存在する汎用名を使用
          west build -s zmk/app -b nrf52840dk/nrf52840 -- \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DSHIELD=clear_orange_right \
          -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y \
          -DZEPHYR_EXTRA_MODULES="${GITHUB_WORKSPACE}/zmk-pmw3610-driver;${GITHUB_WORKSPACE}/zmk-input-behavior-listener"

      - name: Archive Right Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware_right_central
          path: build/zephyr/zmk.uf2

      - name: Build Left (Peripheral)
        run: |
          rm -rf build
          # 左手側も同様に汎用名でビルド
          west build -s zmk/app -b nrf52840dk/nrf52840 -- \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DSHIELD=clear_orange_left \
          -DZEPHYR_EXTRA_MODULES="${GITHUB_WORKSPACE}/zmk-pmw3610-driver;${GITHUB_WORKSPACE}/zmk-input-behavior-listener"

      - name: Archive Left Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware_left_peripheral
          path: build/zephyr/zmk.uf2
