name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: West Init
        run: west init -l config/
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export
      - name: West Build (Right)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
          -DSHIELD=clear_orange_right \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}" \
          -DZEPHYR_EXTRA_MODULES="${GITHUB_WORKSPACE}/zmk/app"
      - name: Rename zmk.uf2
        run: cp build/zephyr/zmk.uf2 clear_orange_right_nice_nano_v2.uf2
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: clear_orange_right_nice_nano_v2.uf2
