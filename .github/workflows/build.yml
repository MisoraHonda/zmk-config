name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init and Update
        run: |
          rm -rf .west
          west init -l config
          west update
          west zephyr-export

      - name: Build Right (Central)
        run: |
          mkdir -p zmk/app/boards/shields/clear_orange
          cp -r boards/shields/clear_orange/* zmk/app/boards/shields/clear_orange/
          west build -s zmk/app -b nice_nano_v2 -- \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DSHIELD=clear_orange_right \
          -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

      - name: Archive Right
        uses: actions/upload-artifact@v4
        with:
          name: firmware_right_central
          path: build/zephyr/zmk.uf2

      - name: Build Left (Peripheral)
        run: |
          rm -rf build
          west build -s zmk/app -b nice_nano_v2 -- \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DSHIELD=clear_orange_left

      - name: Archive Left
        uses: actions/upload-artifact@v4
        with:
          name: firmware_left_peripheral
          path: build/zephyr/zmk.uf2
