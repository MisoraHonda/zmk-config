name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -m https://github.com/zmkfirmware/zmk --mr main

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Force Fix Directory and Build
        run: |
          # 1. 無限ループの元になるファイルを物理的に排除
          rm -f build.yaml west.yml 2>/dev/null || true
          
          # 2. ZMK本体の定義ディレクトリに、あなたのシールドファイルを直接流し込む
          # これにより、外部モジュール設定を使わずに「標準シールド」として認識させます
          mkdir -p zmk/app/boards/shields/clear_orange
          cp -r boards/shields/clear_orange/* zmk/app/boards/shields/clear_orange/
          
          # 3. 余計な引数をすべて捨てて、本体のビルドとして実行
          west build -s zmk/app -b nice_nano_v2 -- \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DSHIELD=clear_orange_right

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/zmk.uf2
